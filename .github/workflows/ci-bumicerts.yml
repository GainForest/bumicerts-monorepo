name: CI - Bumicerts

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/bumicerts/**'
      - 'packages/**'  # Rebuild if packages change
      - 'GENERATED/**'
  pull_request:
    paths:
      - 'apps/bumicerts/**'
      - 'packages/**'
      - 'GENERATED/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.7"

      - name: Install dependencies
        run: bun install

      - name: Generate types
        run: bun run gen:types

      - name: Build library packages (sequential to respect dependency order)
        run: |
          bun run --filter '@gainforest/internal-utils' build
          bun run --filter '@gainforest/atproto-mutations-core' build
          bun run --filter '@gainforest/atproto-auth-next' build
          bun run --filter '@gainforest/atproto-mutations-next' build

      - name: Typecheck bumicerts
        run: bun run typecheck
        working-directory: apps/bumicerts
        env:
          SKIP_ENV_VALIDATION: 1

      - name: Build bumicerts
        run: bun run build
        working-directory: apps/bumicerts
        env:
          SKIP_ENV_VALIDATION: 1
          # Public vars
          NEXT_PUBLIC_APP_URL: https://bumicerts.example.com
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          # Server-side Supabase — SDK throws at instantiation if these are missing
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
          SUPABASE_KEY: placeholder-supabase-key
