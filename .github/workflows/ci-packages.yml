name: CI - Packages

on:
  push:
    branches: [main]
    paths:
      - 'packages/**'
      - 'GENERATED/**'
      - 'package.json'
      - 'bun.lock'
  pull_request:
    paths:
      - 'packages/**'
      - 'GENERATED/**'
      - 'package.json'
      - 'bun.lock'

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.7"

      - name: Install dependencies
        run: bun install

      - name: Generate types
        run: bun run gen:types

      - name: Build packages (sequential to respect dependency order)
        run: |
          bun run --filter '@gainforest/internal-utils' build
          bun run --filter '@gainforest/atproto-mutations-core' build
          bun run --filter '@gainforest/atproto-auth-next' build
          bun run --filter '@gainforest/atproto-mutations-next' build

      - name: Typecheck packages
        run: |
          cd packages/atproto-mutations-core && bun run typecheck
          cd ../atproto-mutations-next && bun run typecheck
          cd ../atproto-auth-next && bun run typecheck


