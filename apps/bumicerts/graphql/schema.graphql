"""
Filter for activity records. Use `did` / `handle` to filter by author. Use `rkey` to fetch a specific activity by key. Use `title`, `shortDescription`, `description` (StringFilter) for field-level search, or `text` for full-text search across all three fields at once. Use `labelTier` to filter by Hyperlabel quality tier. Combine with `and` / `or` / `not` for boolean logic.
"""
input ActivityWhereInput {
  """All child filters must match."""
  and: [ActivityWhereInput!]

  """
  Filter on `description`. Supports equals, startsWith, endsWith, includes.
  """
  description: StringFilterInput

  """Filter to records authored by this DID."""
  did: String

  """
  Filter by AT Protocol handle. Resolved to a DID (takes precedence over `did`).
  """
  handle: String

  """
  If true, only return activities that have an `image` field set in the record payload. Filtered after fetch using the resolved record data.
  """
  hasImage: Boolean

  """
  If true, only return activities whose author DID has an indexed app.gainforest.organization.info record with a non-null displayName. Determined from the inline-resolved creatorInfo (zero extra DB cost).
  """
  hasOrganizationInfoRecord: Boolean

  """
  Filter by Hyperlabel quality tier: high-quality | standard | draft | likely-test. Only returns activities whose author has been assigned this label by the Hyperlabel labeller.
  """
  labelTier: String

  """The child filter must NOT match."""
  not: ActivityWhereInput

  """At least one child filter must match."""
  or: [ActivityWhereInput!]

  """
  Filter by record key (rkey). Combine with `did` to fetch a single specific activity.
  """
  rkey: String

  """
  Filter on `shortDescription`. Supports equals, startsWith, endsWith, includes.
  """
  shortDescription: StringFilterInput

  """
  Full-text search across title, shortDescription and description simultaneously (PostgreSQL websearch_to_tsquery). Supports quoted phrases and minus-negation.
  """
  text: String

  """Filter on `title`. Supports equals, startsWith, endsWith, includes."""
  title: StringFilterInput
}

