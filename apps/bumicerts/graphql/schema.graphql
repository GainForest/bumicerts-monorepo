  dendograms(cursor: String, limit: Int, order: SortOrder, sortBy: SortField, where: WhereInput): OrgDendogramPage
  fauna(cursor: String, limit: Int, order: SortOrder, sortBy: SortField, where: WhereInput): OrgFaunaObservationPage
  flora(cursor: String, limit: Int, order: SortOrder, sortBy: SortField, where: WhereInput): OrgFloraObservationPage
  measuredTreesClusters(cursor: String, limit: Int, order: SortOrder, sortBy: SortField, where: WhereInput): OrgMeasuredTreesClusterPage
}

type OrgPredictionsNamespace {
  fauna(cursor: String, limit: Int, order: SortOrder, sortBy: SortField, where: WhereInput): OrgFaunaPredictionPage
  flora(cursor: String, limit: Int, order: SortOrder, sortBy: SortField, where: WhereInput): OrgFloraPredictionPage
}

type OrgRecordingsNamespace {
  audio(cursor: String, limit: Int, order: SortOrder, sortBy: SortField, where: WhereInput): OrgAudioPage
}

"""Cursor-based pagination metadata."""
type PageInfo {
  """Pass as `cursor` in the next request. Null when no more pages."""
  endCursor: String

  """True if more records exist beyond this page."""
  hasNextPage: Boolean
}

"""GainForest AT Protocol record index."""
type Query {
  """All Certified indexed records, grouped by namespace."""
  certified: CertifiedNamespace

  """Total number of indexed records per lexicon collection."""
  collectionStats: [CollectionStat!]

  """All GainForest indexed records, grouped by namespace."""
  gainforest: GainforestNamespace

  """All Hypercerts indexed records, grouped by namespace."""
  hypercerts: HypercertsNamespace

  """All Impact Indexer indexed records, grouped by namespace."""
  impactIndexer: ImpactIndexerNamespace
}

"""AT Protocol envelope fields present on every indexed record."""
type RecordMeta {
  """Content hash (CID)"""
  cid: String

  """Lexicon collection NSID"""
  collection: String

  """Creation time from record payload"""
  createdAt: DateTime

  """DID of the record author"""
  did: String

  """When the indexer stored this record"""
  indexedAt: DateTime

  """Record key (TID or literal)"""
  rkey: String

  """Full AT-URI (at://did/collection/rkey)"""
  uri: String
}

"""Which timestamp field to sort and paginate on."""
enum SortField {
  """Sort by record creation timestamp (default)"""
  CREATED_AT

  """Sort by when the indexer stored the record"""
  INDEXED_AT
}

"""Sort direction for paginated queries."""
enum SortOrder {
  """Oldest / smallest first"""
  ASC

  """Newest / largest first (default)"""
  DESC
}

"""
Case-insensitive string match filter. All provided modes are combined with AND. e.g. { startsWith: "carbon", endsWith: "forest" } matches strings that begin with "carbon" AND end with "forest".
"""
input StringFilterInput {
  """Value must end with this suffix (ILIKE '%value')."""
  endsWith: String

  """Exact case-insensitive equality (lower(col) = lower(value))."""
  equals: String

  """Value must contain this substring (ILIKE '%value%')."""
  includes: String

  """Value must begin with this prefix (ILIKE 'value%')."""
  startsWith: String
}

"""
An AT Protocol strong reference (URI + CID for version-pinned linking).
"""
type StrongRef {
  """CID of the referenced record version"""
  cid: String

  """AT-URI of the referenced record"""
  uri: String
}

"""
Filter records by author identity. `handle` takes precedence over `did` if both are supplied. Combine conditions with `and` / `or` / `not`.
"""
input WhereInput {
  """All child filters must match (logical AND)."""
  and: [WhereInput!]

  """Filter to records authored by this DID (e.g. did:plc:abc123)."""
  did: String

  """
  Filter by AT Protocol handle (e.g. gainforest.bsky.social). Resolved to a DID via the Bluesky AppView API (cached 10 min). Takes precedence over `did` if both are supplied.
  """
  handle: String

  """The child filter must NOT match (logical NOT)."""
  not: WhereInput

  """At least one child filter must match (logical OR)."""
  or: [WhereInput!]
}