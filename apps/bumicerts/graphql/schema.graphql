Filter for organization info records. Use `did` / `handle` to filter by author. Use `displayName`, `shortDescription`, `longDescription` (StringFilter) for field-level search, or `text` for full-text search across all three fields at once. Combine with `and` / `or` / `not` for boolean logic.
