  """
  reindexRepoByDid(
    """List of DIDs to reindex"""
    dids: [String!]!
  ): Int

  """Stop tracking DIDs in Tap."""
  removeRepos(
    """List of DIDs to remove"""
    dids: [String!]!
  ): Boolean
}

