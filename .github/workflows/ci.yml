name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      deploy_indexer:
        description: 'Deploy indexer to Railway'
        type: boolean
        default: true
      skip_cache:
        description: 'Force rebuild packages (ignore cache)'
        type: boolean
        default: false

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Setup: Shared steps - detect changes, build packages (cached)
  # ─────────────────────────────────────────────────────────────────────────────
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      packages_changed: ${{ steps.changes.outputs.packages }}
      bumicerts_changed: ${{ steps.changes.outputs.bumicerts }}
      indexer_changed: ${{ steps.changes.outputs.indexer }}
      collection_filters: ${{ steps.filters.outputs.value }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            packages:
              - 'packages/**'
              - 'GENERATED/**'
            bumicerts:
              - 'apps/bumicerts/**'
              - '!apps/bumicerts/**/*.md'
              - 'apps/bumicerts/app/**/*.md'
              - 'apps/bumicerts/public/**/*.md'
            indexer:
              - 'apps/indexer/**'
              - 'packages/internal-utils/**'
              - 'GENERATED/lexicons/**'
              - 'GENERATED/scripts/generate-collections.ts'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.7"

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-deps-${{ hashFiles('bun.lock') }}
          restore-keys: bun-deps-

      - name: Install dependencies
        run: bun install

      - name: Restore packages dist cache
        if: inputs.skip_cache != true
        id: dist-cache
        uses: actions/cache@v4
        with:
          path: packages/*/dist
          key: packages-dist-${{ hashFiles('packages/*/src/**', 'packages/*/tsconfig.json', 'packages/*/tsup.config.ts') }}

      - name: Generate types
        if: steps.dist-cache.outputs.cache-hit != 'true'
        run: bun run gen:types

      - name: Build packages (parallel where possible)
        if: steps.dist-cache.outputs.cache-hit != 'true'
        run: |
          bun run --filter '@gainforest/internal-utils' --filter '@gainforest/atproto-mutations-core' --filter '@gainforest/atproto-auth-next' --filter '@gainforest/leaflet-react' build
          bun run --filter '@gainforest/atproto-mutations-next' build

      - name: Generate collection filters
        id: filters
        if: steps.changes.outputs.indexer == 'true'
        working-directory: apps/indexer
        run: |
          FILTERS=$(bun run src/tap/collection-filters.ts)
          echo "value=$FILTERS" >> $GITHUB_OUTPUT

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages-dist
          path: packages/*/dist
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────────
  # Packages: Typecheck all packages
  # ─────────────────────────────────────────────────────────────────────────────
  packages:
    name: Typecheck Packages
    needs: setup
    if: needs.setup.outputs.packages_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.7"

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-deps-${{ hashFiles('bun.lock') }}
          restore-keys: bun-deps-

      - name: Install dependencies
        run: bun install

      - uses: actions/download-artifact@v4
        with:
          name: packages-dist
          path: packages

      - name: Typecheck packages
        run: |
          cd packages/atproto-mutations-core && bun run typecheck
          cd ../atproto-mutations-next && bun run typecheck
          cd ../atproto-auth-next && bun run typecheck
          cd ../leaflet-react && bun run typecheck

  # ─────────────────────────────────────────────────────────────────────────────
  # Bumicerts: Typecheck (Vercel handles deployment after CI passes)
  # ─────────────────────────────────────────────────────────────────────────────
  bumicerts:
    name: Validate Bumicerts
    needs: setup
    if: needs.setup.outputs.bumicerts_changed == 'true' || needs.setup.outputs.packages_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.7"

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-deps-${{ hashFiles('bun.lock') }}
          restore-keys: bun-deps-

      - name: Install dependencies
        run: bun install

      - uses: actions/download-artifact@v4
        with:
          name: packages-dist
          path: packages

      - name: Generate types
        run: bun run gen:types

      - name: Typecheck bumicerts
        run: bun run typecheck
        working-directory: apps/bumicerts
        env:
          SKIP_ENV_VALIDATION: "1"

  # ─────────────────────────────────────────────────────────────────────────────
  # Indexer: Validate + Deploy to Railway
  # ─────────────────────────────────────────────────────────────────────────────
  indexer:
    name: Validate & Deploy Indexer
    needs: setup
    if: needs.setup.outputs.indexer_changed == 'true'
    runs-on: ubuntu-latest
    env:
      RAILWAY_API: https://backboard.railway.com/graphql/v2
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.7"

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-deps-${{ hashFiles('bun.lock') }}
          restore-keys: bun-deps-

      - name: Install dependencies
        run: bun install

      - name: Typecheck indexer
        run: bun run typecheck
        working-directory: apps/indexer

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build dev Dockerfile (smoke test)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/indexer/Dockerfile
          push: false
          tags: gainforest-indexer:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Railway Dockerfile (smoke test)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/indexer/Dockerfile.railway
          push: false
          tags: gainforest-indexer-railway:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Deploy (only on main, not PRs) ──────────────────────────────────────
      - name: Check deployment prerequisites
        id: check
        if: |
          github.ref == 'refs/heads/main' && 
          github.event_name != 'pull_request' &&
          (github.event.inputs.deploy_indexer != 'false')
        run: |
          if [ -z "$RAILWAY_TOKEN" ] || [ -z "$RAILWAY_PROJECT_ID" ]; then
            echo "ready=false" >> $GITHUB_OUTPUT
            echo "::warning::RAILWAY_TOKEN or RAILWAY_PROJECT_ID not set"
          else
            echo "ready=true" >> $GITHUB_OUTPUT
          fi

      - name: Resolve Railway IDs
        if: steps.check.outputs.ready == 'true'
        id: resolve
        run: |
          RESPONSE=$(curl -sf -X POST "$RAILWAY_API" \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"query { project(id: \\\"$RAILWAY_PROJECT_ID\\\") { environments { edges { node { id name } } } services { edges { node { id name } } } } }\"}")

          echo "API response: $RESPONSE"

          ENV_ID=$(echo "$RESPONSE" | jq -r '.data.project.environments.edges[0].node.id')
          TAP_ID=$(echo "$RESPONSE" | jq -r '.data.project.services.edges[] | select(.node.name == "tap") | .node.id')
          INDEXER_ID=$(echo "$RESPONSE" | jq -r '.data.project.services.edges[] | select(.node.name == "indexer") | .node.id')

          echo "env_id=$ENV_ID" >> $GITHUB_OUTPUT
          echo "tap_id=$TAP_ID" >> $GITHUB_OUTPUT
          echo "indexer_id=$INDEXER_ID" >> $GITHUB_OUTPUT

          echo "Environment ID : $ENV_ID"
          echo "Tap service ID : $TAP_ID"
          echo "Indexer service ID: $INDEXER_ID"

      - name: Sync Tap environment variables
        if: steps.check.outputs.ready == 'true'
        env:
          FILTERS: ${{ needs.setup.outputs.collection_filters }}
          RESOLVED_ENV_ID: ${{ steps.resolve.outputs.env_id }}
          RESOLVED_TAP_ID: ${{ steps.resolve.outputs.tap_id }}
        run: |
          # Build the Railway reference prefix as a shell variable so GitHub
          # Actions never sees a raw reference-open token in this script.
          RAILWAY_REF_PREFIX='$'"{{" # dollar + double-brace: matches Railway refs in env files
          # Parse static vars from tap.env.railway
          # Skip comments, blank lines, and Railway reference/secret lines
          VARS_JSON=$(grep -v '^\s*#' apps/indexer/railway/tap.env.railway \
            | grep -v '^\s*$' \
            | grep -v "$RAILWAY_REF_PREFIX" \
            | awk -F'=' '{key=$1; $1=""; val=substr($0,2); gsub(/^[ \t]+|[ \t]+$/, "", val); print key "=" val}' \
            | jq -R -s '
                split("\n")
                | map(select(length > 0))
                | map(
                    . as $line
                    | ($line | index("=")) as $i
                    | { ($line[:$i]): $line[$i+1:] }
                  )
                | add // {}
              ')

          # Override TAP_COLLECTION_FILTERS with the freshly generated value
          VARS_JSON=$(echo "$VARS_JSON" | jq --arg v "$FILTERS" '. + {"TAP_COLLECTION_FILTERS": $v}')

          echo "Syncing Tap vars: $(echo "$VARS_JSON" | jq 'keys')"

          curl -sf -X POST "$RAILWAY_API" \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg projectId     "$RAILWAY_PROJECT_ID" \
              --arg environmentId "$RESOLVED_ENV_ID" \
              --arg serviceId     "$RESOLVED_TAP_ID" \
              --argjson variables "$VARS_JSON" \
              '{
                query: "mutation($input: VariableCollectionUpsertInput!) { variableCollectionUpsert(input: $input) }",
                variables: { input: { projectId: $projectId, environmentId: $environmentId, serviceId: $serviceId, variables: $variables } }
              }')"

          echo "✅ Tap environment variables synced"

      - name: Sync Indexer environment variables
        if: steps.check.outputs.ready == 'true'
        env:
          RESOLVED_ENV_ID: ${{ steps.resolve.outputs.env_id }}
          RESOLVED_INDEXER_ID: ${{ steps.resolve.outputs.indexer_id }}
        run: |
          RAILWAY_REF_PREFIX='$'"{{" # dollar + double-brace: matches Railway refs in env files
          VARS_JSON=$(grep -v '^\s*#' apps/indexer/.env.railway \
            | grep -v '^\s*$' \
            | grep -v "$RAILWAY_REF_PREFIX" \
            | awk -F'=' '{key=$1; $1=""; val=substr($0,2); gsub(/^[ \t]+|[ \t]+$/, "", val); print key "=" val}' \
            | jq -R -s '
                split("\n")
                | map(select(length > 0))
                | map(
                    . as $line
                    | ($line | index("=")) as $i
                    | { ($line[:$i]): $line[$i+1:] }
                  )
                | add // {}
              ')

          echo "Syncing Indexer vars: $(echo "$VARS_JSON" | jq 'keys')"

          curl -sf -X POST "$RAILWAY_API" \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg projectId     "$RAILWAY_PROJECT_ID" \
              --arg environmentId "$RESOLVED_ENV_ID" \
              --arg serviceId     "$RESOLVED_INDEXER_ID" \
              --argjson variables "$VARS_JSON" \
              '{
                query: "mutation($input: VariableCollectionUpsertInput!) { variableCollectionUpsert(input: $input) }",
                variables: { input: { projectId: $projectId, environmentId: $environmentId, serviceId: $serviceId, variables: $variables } }
              }')"

          echo "✅ Indexer environment variables synced"

      - name: Redeploy Tap service
        if: steps.check.outputs.ready == 'true'
        env:
          RESOLVED_TAP_ID: ${{ steps.resolve.outputs.tap_id }}
          RESOLVED_ENV_ID: ${{ steps.resolve.outputs.env_id }}
        run: |
          RESPONSE=$(curl -sf -X POST "$RAILWAY_API" \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg serviceId     "$RESOLVED_TAP_ID" \
              --arg environmentId "$RESOLVED_ENV_ID" \
              '{
                query: "mutation($serviceId: String!, $environmentId: String!) { serviceInstanceDeploy(serviceId: $serviceId, environmentId: $environmentId) }",
                variables: { serviceId: $serviceId, environmentId: $environmentId }
              }')")
          echo "✅ Tap redeploy triggered"
          echo "$RESPONSE"

      - name: Redeploy Indexer service
        if: steps.check.outputs.ready == 'true'
        env:
          RESOLVED_INDEXER_ID: ${{ steps.resolve.outputs.indexer_id }}
          RESOLVED_ENV_ID: ${{ steps.resolve.outputs.env_id }}
        run: |
          RESPONSE=$(curl -sf -X POST "$RAILWAY_API" \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg serviceId     "$RESOLVED_INDEXER_ID" \
              --arg environmentId "$RESOLVED_ENV_ID" \
              '{
                query: "mutation($serviceId: String!, $environmentId: String!) { serviceInstanceDeploy(serviceId: $serviceId, environmentId: $environmentId) }",
                variables: { serviceId: $serviceId, environmentId: $environmentId }
              }')")
          echo "✅ Indexer redeploy triggered"
          echo "$RESPONSE"

      - name: Deployment Summary
        if: always()
        run: |
          echo "### Railway Deployment" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check.outputs.ready }}" != "true" ]; then
            echo "⚠️ **Skipped:** RAILWAY_TOKEN or RAILWAY_PROJECT_ID not configured, or not on main branch" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ Env vars synced and deployment triggered — check [Railway Dashboard](https://railway.app) for status." >> $GITHUB_STEP_SUMMARY
          fi
