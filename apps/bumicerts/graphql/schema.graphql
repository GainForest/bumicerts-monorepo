  longDescription: StringFilterInput

  """The child filter must NOT match."""
  not: OrgInfoWhereInput

  """At least one child filter must match."""
  or: [OrgInfoWhereInput!]

  """
  Filter on `shortDescription`. Supports equals, startsWith, endsWith, includes.
