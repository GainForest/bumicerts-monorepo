  """
  handle: String

  """
  Filter on `longDescription`. Supports equals, startsWith, endsWith, includes.
  """
  longDescription: StringFilterInput

  """The child filter must NOT match."""
  not: OrgInfoWhereInput

  """At least one child filter must match."""
  or: [OrgInfoWhereInput!]

  """
  Filter on `shortDescription`. Supports equals, startsWith, endsWith, includes.
  """
  shortDescription: StringFilterInput

  """
  Full-text search across displayName, shortDescription and longDescription simultaneously (PostgreSQL websearch_to_tsquery). Supports quoted phrases and minus-negation.
  """
  text: String
}

