"""Hypercerts AT Protocol records (org.hypercerts.*)."""
type HypercertsNamespace {
  acknowledgement(cursor: String, limit: Int, order: SortOrder, sortBy: SortField, where: WhereInput): HcAcknowledgementPage

  """
  Paginated list of org.hypercerts.claim.activity records. When `where` contains no text-filter fields, returns all records ordered by time (sortBy/order apply). When `where` contains any of title/shortDescription/description/text, runs a text search (sortBy/order are ignored; results ordered by indexed_at DESC). Combine with `labelTier` to intersect label and text filters.
  """
  activity(
    cursor: String

    """
    Filter by Hyperlabel quality tier: high-quality | standard | draft | likely-test
    """
    labelTier: String
    limit: Int

    """Sort direction when no text filter is present."""
    order: SortOrder

    """Sort field when no text filter is present."""
    sortBy: SortField
    where: ActivityWhereInput
  ): HcActivityPage
  attachment(cursor: String, limit: Int, order: SortOrder, sortBy: SortField, where: WhereInput): HcAttachmentPage
  collection(cursor: String, limit: Int, order: SortOrder, sortBy: SortField, where: WhereInput): HcCollectionPage
  contributionDetail(cursor: String, limit: Int, order: SortOrder, sortBy: SortField, where: WhereInput): HcContributionDetailsPage
  contributorInformation(cursor: String, limit: Int, order: SortOrder, sortBy: SortField, where: WhereInput): HcContributorInformationPage
  evaluation(cursor: String, limit: Int, order: SortOrder, sortBy: SortField, where: WhereInput): HcEvaluationPage
  fundingReceipt(cursor: String, limit: Int, order: SortOrder, sortBy: SortField, where: WhereInput): HcFundingReceiptPage

  """Helper records (org.hypercerts.helper.*)."""
  helper: HcHelperNamespace
  measurement(cursor: String, limit: Int, order: SortOrder, sortBy: SortField, where: WhereInput): HcMeasurementPage
  rights(cursor: String, limit: Int, order: SortOrder, sortBy: SortField, where: WhereInput): HcRightsPage
}

