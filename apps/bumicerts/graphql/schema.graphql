    """
    maxPagesPerCollection: Int

    """Window start (ISO datetime)"""
    startIso: String!
  ): Int

  """
  Discover all DIDs that have records for the given collection NSID via the relay, then wipe and re-backfill each. Returns the number of DIDs reindexed.
