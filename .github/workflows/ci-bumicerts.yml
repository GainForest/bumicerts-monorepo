name: CI - Bumicerts

on:
  push:
    branches: [main]
    paths:
      - 'apps/bumicerts/**'
      - 'packages/**'  # Rebuild if packages change
      - 'GENERATED/**'
  pull_request:
    paths:
      - 'apps/bumicerts/**'
      - 'packages/**'
      - 'GENERATED/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate types
        run: bun run gen:types

      - name: Build library packages (sequential to respect dependency order)
        run: |
          bun run --filter '@gainforest/internal-utils' build
          bun run --filter '@gainforest/atproto-mutations-core' build
          bun run --filter '@gainforest/atproto-auth-next' build
          bun run --filter '@gainforest/atproto-mutations-next' build

      - name: Typecheck bumicerts
        run: bun run typecheck
        working-directory: apps/bumicerts
        env:
          SKIP_ENV_VALIDATION: 1

      - name: Build bumicerts
        run: bun run build
        working-directory: apps/bumicerts
        env:
          NEXT_PUBLIC_APP_URL: https://bumicerts.example.com
          SKIP_ENV_VALIDATION: 1
