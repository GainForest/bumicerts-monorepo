}

"""Sort direction for paginated queries."""
enum SortOrder {
  """Oldest / smallest first"""
  ASC

  """Newest / largest first (default)"""
  DESC
}

"""
Case-insensitive string match filter. All provided modes are combined with AND. e.g. { startsWith: "carbon", endsWith: "forest" } matches strings that begin with "carbon" AND end with "forest".
"""
input StringFilterInput {
  """Value must end with this suffix (ILIKE '%value')."""
  endsWith: String

  """Exact case-insensitive equality (lower(col) = lower(value))."""
  equals: String

  """Value must contain this substring (ILIKE '%value%')."""
  includes: String

  """Value must begin with this prefix (ILIKE 'value%')."""
  startsWith: String
}

"""
An AT Protocol strong reference (URI + CID for version-pinned linking).
"""
type StrongRef {
  """CID of the referenced record version"""
  cid: String

  """AT-URI of the referenced record"""
  uri: String
}

"""
Filter records by author identity. `handle` takes precedence over `did` if both are supplied. Combine conditions with `and` / `or` / `not`.
"""
input WhereInput {
  """All child filters must match (logical AND)."""
  and: [WhereInput!]

  """Filter to records authored by this DID (e.g. did:plc:abc123)."""
  did: String

  """
  Filter by AT Protocol handle (e.g. gainforest.bsky.social). Resolved to a DID via the Bluesky AppView API (cached 10 min). Takes precedence over `did` if both are supplied.
  """
  handle: String

  """The child filter must NOT match (logical NOT)."""
  not: WhereInput

  """At least one child filter must match (logical OR)."""
  or: [WhereInput!]
}