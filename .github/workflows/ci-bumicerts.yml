name: CI - Bumicerts

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/bumicerts/**'
      - 'packages/**'  # Rebuild if packages change
      - 'GENERATED/**'
  pull_request:
    paths:
      - 'apps/bumicerts/**'
      - 'packages/**'
      - 'GENERATED/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.7"

      - name: Install dependencies
        run: bun install

      - name: Generate types
        run: bun run gen:types

      - name: Build library packages (sequential to respect dependency order)
        run: |
          bun run --filter '@gainforest/internal-utils' build
          bun run --filter '@gainforest/atproto-mutations-core' build
          bun run --filter '@gainforest/atproto-auth-next' build
          bun run --filter '@gainforest/atproto-mutations-next' build

      - name: Typecheck bumicerts
        run: bun run typecheck
        working-directory: apps/bumicerts
        env:
          SKIP_ENV_VALIDATION: 1

      - name: Build bumicerts
        run: bunx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/bumicerts
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel
        if: github.event_name != 'pull_request'
        run: bunx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/bumicerts
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
