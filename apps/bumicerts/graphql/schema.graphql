"""
Filter for organization info records. Use `did` / `handle` to filter by author. Use `displayName`, `shortDescription`, `longDescription` (StringFilter) for field-level search, or `text` for full-text search across all three fields at once. Combine with `and` / `or` / `not` for boolean logic.
"""
input OrgInfoWhereInput {
  """All child filters must match."""
  and: [OrgInfoWhereInput!]

  """Filter to records authored by this DID."""
  did: String

  """
  Filter on `displayName`. Supports equals, startsWith, endsWith, includes.
  """
  displayName: StringFilterInput

  """
  Filter by AT Protocol handle. Resolved to a DID (takes precedence over `did`).
  """
  handle: String

  """
  Filter on `longDescription`. Supports equals, startsWith, endsWith, includes.
  """
  longDescription: StringFilterInput

  """The child filter must NOT match."""
  not: OrgInfoWhereInput

  """At least one child filter must match."""
  or: [OrgInfoWhereInput!]

  """
  Filter on `shortDescription`. Supports equals, startsWith, endsWith, includes.
  """
  shortDescription: StringFilterInput

  """
  Full-text search across displayName, shortDescription and longDescription simultaneously (PostgreSQL websearch_to_tsquery). Supports quoted phrases and minus-negation.
  """
  text: String
}

