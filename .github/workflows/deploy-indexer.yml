name: Deploy Indexer to Railway

on:
  push:
    branches: [main]
    paths:
      - 'apps/indexer/**'
      - 'packages/internal-utils/**'
      - 'GENERATED/lexicons/**'
  workflow_dispatch:
    inputs:
      skip_railway:
        description: 'Skip Railway deployment (validation only)'
        required: false
        default: 'false'

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    outputs:
      collection_filters: ${{ steps.filters.outputs.value }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.7"

      - name: Install dependencies
        run: bun install

      - name: Typecheck indexer
        run: bun run typecheck
        working-directory: apps/indexer

      - name: Generate collection filters
        id: filters
        working-directory: apps/indexer
        run: |
          FILTERS=$(bun run src/tap/collection-filters.ts)
          echo "value=$FILTERS" >> $GITHUB_OUTPUT
          echo "### Validation Passed ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**TAP_COLLECTION_FILTERS:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "$FILTERS" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  deploy:
    name: Deploy to Railway
    needs: validate
    runs-on: ubuntu-latest
    # Only run if:
    # 1. Not skipped via workflow input
    # 2. RAILWAY_TOKEN secret exists
    # 3. On the main repo (not forks)
    if: |
      github.event.inputs.skip_railway != 'true' &&
      github.repository == 'GainForest/atproto-packages'
    steps:
      - name: Check RAILWAY_API_TOKEN
        id: check_token
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "$RAILWAY_API_TOKEN" ]; then
            echo "has_token=false" >> $GITHUB_OUTPUT
            echo "::warning::RAILWAY_TOKEN secret is not set. Skipping Railway deployment."
          else
            echo "has_token=true" >> $GITHUB_OUTPUT
          fi

      - name: Install Railway CLI
        if: steps.check_token.outputs.has_token == 'true'
        run: npm i -g @railway/cli

      - name: Sync TAP_COLLECTION_FILTERS to Tap service
        if: steps.check_token.outputs.has_token == 'true'
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
        run: |
          echo "Updating TAP_COLLECTION_FILTERS on Tap service..."
          OUTPUT=$(railway variables set "TAP_COLLECTION_FILTERS=${{ needs.validate.outputs.collection_filters }}" -s tap 2>&1) && {
            echo "✅ Updated TAP_COLLECTION_FILTERS"
            echo "$OUTPUT"
          } || {
            echo "::warning::Could not update Tap variables: $OUTPUT"
          }

      - name: Redeploy Tap service
        if: steps.check_token.outputs.has_token == 'true'
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
        run: |
          echo "Redeploying Tap service..."
          OUTPUT=$(railway redeploy -s tap -y 2>&1) && {
            echo "✅ Tap redeployment triggered"
            echo "$OUTPUT"
          } || {
            echo "::warning::Could not redeploy Tap: $OUTPUT"
          }

      - name: Redeploy Indexer service
        if: steps.check_token.outputs.has_token == 'true'
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
        run: |
          echo "Redeploying Indexer service..."
          OUTPUT=$(railway redeploy -s indexer -y 2>&1) && {
            echo "✅ Indexer redeployment triggered"
            echo "$OUTPUT"
          } || {
            echo "::warning::Could not redeploy Indexer: $OUTPUT"
          }

      - name: Deployment Summary
        if: always()
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Railway Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ steps.check_token.outputs.has_token }}" != "true" ]; then
            echo "⚠️ **Skipped:** RAILWAY_TOKEN secret not configured" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "To enable automatic deployment:" >> $GITHUB_STEP_SUMMARY
            echo "1. Create an account token at https://railway.app/account/tokens" >> $GITHUB_STEP_SUMMARY
            echo "2. Add it as \`RAILWAY_TOKEN\` in GitHub Secrets (used as RAILWAY_API_TOKEN by the CLI)" >> $GITHUB_STEP_SUMMARY
            echo "3. Add \`RAILWAY_PROJECT_ID\` from your Railway project settings" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ Deployment commands executed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Check [Railway Dashboard](https://railway.app) for deployment status." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "If deployments failed, check the logs above for specific errors." >> $GITHUB_STEP_SUMMARY
          fi
