name: CI - Indexer

on:
  push:
    branches: [main]
    paths:
      - 'apps/indexer/**'
      - 'GENERATED/lexicons/**'
      - 'GENERATED/scripts/generate-collections.ts'
  pull_request:
    paths:
      - 'apps/indexer/**'
      - 'GENERATED/lexicons/**'
      - 'GENERATED/scripts/generate-collections.ts'

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.7"

      - name: Install dependencies
        run: bun install

      - name: Typecheck indexer
        run: bun run typecheck
        working-directory: apps/indexer

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/indexer/Dockerfile
          push: false
          tags: gainforest-indexer:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
