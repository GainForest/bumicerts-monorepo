name: CI - Bumicerts

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/bumicerts/**'
      - 'packages/**'  # Rebuild if packages change
      - 'GENERATED/**'
  pull_request:
    paths:
      - 'apps/bumicerts/**'
      - 'packages/**'
      - 'GENERATED/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.7"

      - name: Install dependencies
        run: bun install

      - name: Generate types
        run: bun run gen:types

      - name: Build library packages (sequential to respect dependency order)
        run: |
          bun run --filter '@gainforest/internal-utils' build
          bun run --filter '@gainforest/atproto-mutations-core' build
          bun run --filter '@gainforest/atproto-auth-next' build
          bun run --filter '@gainforest/atproto-mutations-next' build

      - name: Typecheck bumicerts
        run: bun run typecheck
        working-directory: apps/bumicerts
        env:
          SKIP_ENV_VALIDATION: 1

      - name: Pull Vercel project settings and env vars
        if: github.event_name != 'pull_request'
        run: bunx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/bumicerts
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build bumicerts (via Vercel CLI to produce prebuilt output)
        if: github.event_name != 'pull_request'
        run: bunx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/bumicerts
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build bumicerts (next build only, for PR checks)
        if: github.event_name == 'pull_request'
        run: bun run build
        working-directory: apps/bumicerts
        env:
          SKIP_ENV_VALIDATION: 1
          NEXT_PUBLIC_APP_URL: https://bumicerts.example.com
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
          SUPABASE_KEY: placeholder-supabase-key
          RESEND_API_KEY: re_placeholder_key

      - name: Deploy to Vercel
        if: success() && github.event_name != 'pull_request'
        run: bunx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/bumicerts
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
